<div
  class="auth-shell flex min-h-screen items-center justify-center overflow-hidden px-4 py-6 sm:px-6 lg:px-10"
>
  <img
    [src]="pageBackgroundImage"
    alt=""
    aria-hidden="true"
    class="pointer-events-none absolute inset-0 h-full w-full object-cover"
  />
  <div class="pointer-events-none absolute inset-0 bg-[linear-gradient(180deg,rgba(255,255,255,0.04),rgba(255,255,255,0.08))] backdrop-blur-[6px]"></div>

  <div
    class="relative z-10 grid w-full max-w-[1180px] overflow-hidden rounded-[34px] border border-surface/70 bg-[linear-gradient(135deg,rgba(255,255,255,0.28),rgba(255,246,240,0.16))] shadow-[0_28px_80px_rgba(15,23,42,0.12)] backdrop-blur-[24px] lg:grid-cols-[1.05fr_0.95fr]"
  >
    <section class="relative min-h-[320px] overflow-hidden lg:min-h-[720px]">
      @if (!heroImageFailed) {
        <img
          [src]="heroImage"
          alt="Emotional bond with a dog"
          class="absolute inset-0 h-full w-full object-cover"
          (error)="onHeroImageError()"
        />
      } @else {
        <div
          class="absolute inset-0 bg-[linear-gradient(145deg,#d8c7b2_0%,#ebdfd0_42%,#d9c7b5_100%)]"
        ></div>
      }

      <div class="absolute inset-0 bg-[linear-gradient(90deg,rgba(47,36,28,0.24)_0%,rgba(255,255,255,0.04)_48%,rgba(255,255,255,0)_100%)]"></div>
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_16%_86%,rgba(240,168,84,0.2),transparent_18%),radial-gradient(circle_at_78%_20%,rgba(255,255,255,0.16),transparent_20%)]"></div>
      <div class="absolute inset-y-0 right-0 w-24 bg-gradient-to-r from-transparent to-white/40"></div>

      <div class="relative flex h-full flex-col justify-between p-6 sm:p-8 lg:p-10">
        <div class="inline-flex w-fit items-center gap-2 rounded-full border border-surface/28 bg-white/12 px-4 py-2 text-sm font-medium text-white backdrop-blur-md">
          <span class="h-2.5 w-2.5 rounded-full bg-emerald-300"></span>
        </div>

        <div class="max-w-[360px] rounded-[28px] border border-surface/18 bg-[linear-gradient(135deg,rgba(62,52,43,0.34)_0%,rgba(143,111,78,0.2)_100%)] p-6 text-white backdrop-blur-md">
          <app-logo [className]="'[&_span]:!text-white'"></app-logo>
          <h2 class="mt-6 text-[2rem] font-semibold leading-[1.08] tracking-[-0.04em]">
            Gestion veterinaria en un solo lugar
          </h2>
          <p class="mt-4 text-sm leading-7 text-white/82">
            Una experiencia confiable para brindar atencion con calidad.
          </p>
        </div>
      </div>
    </section>

    <section class="relative flex items-center overflow-visible bg-[linear-gradient(180deg,rgba(255,247,241,0.94),rgba(255,239,229,0.88))] px-5 py-8 sm:px-8 lg:px-12 lg:py-12">
      <div class="absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(255,255,255,0.48),transparent_34%),radial-gradient(circle_at_bottom_right,rgba(233,167,112,0.14),transparent_28%)]"></div>
      <div class="absolute inset-y-8 left-0 hidden w-px bg-[linear-gradient(180deg,transparent,rgba(176,127,89,0.22),transparent)] lg:block"></div>
      <div class="relative mx-auto w-full max-w-[430px]">
        <app-login-form></app-login-form>
      </div>
    </section>
  </div>
</div>
