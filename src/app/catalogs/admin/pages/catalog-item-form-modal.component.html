@if (open) {
  <div
    class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6"
    role="dialog"
    aria-modal="true"
  >
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm transition-opacity" (click)="close()"></div>

    <div
      class="relative w-full max-w-xl overflow-hidden rounded-2xl bg-card shadow-2xl animate-in fade-in zoom-in-95 duration-200"
      (click)="$event.stopPropagation()"
    >
      <div class="border-b border-border px-6 py-5">
        <div class="flex items-start justify-between gap-4">
          <div class="space-y-2">
            <h2 class="text-xl font-bold text-text-primary">{{ modalTitle() }}</h2>
            <p class="text-sm leading-6 text-text-secondary">{{ modalDescription() }}</p>
          </div>

          <button
            type="button"
            class="rounded-lg p-2 text-text-secondary transition-colors hover:bg-background"
            [disabled]="isSaving"
            (click)="close()"
            aria-label="Cerrar modal"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M18 6 6 18"></path>
              <path d="m6 6 12 12"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="space-y-5 px-6 py-5">
        <div class="space-y-2">
          <label class="text-sm font-semibold text-text-primary">Nombre</label>
          <input
            type="text"
            [(ngModel)]="name"
            name="catalogItemName"
            maxlength="120"
            placeholder="Escribe el nombre del catálogo"
            class="h-12 w-full rounded-xl border border-border bg-surface px-4 text-sm text-text-primary shadow-sm transition-all placeholder:text-text-secondary/40 focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/10"
            [class.border-red-300]="hasNameError()"
          />
          @if (hasNameError()) {
            <p class="text-xs font-medium text-red-600">El nombre es obligatorio.</p>
          }
        </div>

        <div class="space-y-2">
          <label class="text-sm font-semibold text-text-primary">{{ descriptionLabel() }}</label>
          <textarea
            [(ngModel)]="description"
            name="catalogItemDescription"
            rows="4"
            placeholder="Agrega un contexto opcional para este elemento del catálogo"
            class="w-full rounded-xl border border-border bg-surface px-4 py-3 text-sm text-text-primary shadow-sm transition-all placeholder:text-text-secondary/40 focus:border-brand focus:outline-none focus:ring-2 focus:ring-brand/10"
          ></textarea>
        </div>

        @if (shouldShowAnesthesia()) {
          <label class="flex items-start gap-3 rounded-xl border border-border bg-surface px-4 py-3">
            <input
              type="checkbox"
              [(ngModel)]="requiresAnesthesia"
              name="requiresAnesthesia"
              class="mt-1 h-4 w-4 rounded border-border text-primary focus:ring-primary"
            />
            <span class="space-y-1">
              <span class="block text-sm font-semibold text-text-primary">Requiere anestesia</span>
              <span class="block text-xs leading-5 text-text-secondary">
                Marca esta opción para distinguir cirugías que deben pasar por protocolo anestésico.
              </span>
            </span>
          </label>
        }

        @if (errorMessage) {
          <div class="rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
            {{ errorMessage }}
          </div>
        }
      </div>

      <div class="border-t border-border bg-background/60 px-6 py-4">
        <div class="flex flex-col-reverse gap-3 sm:flex-row sm:justify-end">
          <button
            type="button"
            class="rounded-xl px-4 py-2 text-sm font-bold text-text-secondary transition-colors hover:bg-border/50"
            [disabled]="isSaving"
            (click)="close()"
          >
            Cancelar
          </button>
          <button
            type="button"
            class="rounded-xl bg-primary px-4 py-2 text-sm font-bold text-white shadow-sm transition-all hover:bg-primary/90 disabled:opacity-50"
            [disabled]="isSaving"
            (click)="submit()"
          >
            {{ isSaving ? 'Guardando...' : 'Guardar' }}
          </button>
        </div>
      </div>
    </div>
  </div>
}
