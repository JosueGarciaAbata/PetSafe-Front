<div class="mx-auto flex max-w-[1280px] flex-col gap-6 pb-12">
  <button
    type="button"
    routerLink="/pets"
    class="inline-flex items-center gap-2 self-start text-sm font-medium text-text-secondary transition-colors hover:text-brand"
  >
    <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="m15 18-6-6 6-6"></path>
    </svg>
    <span>Volver a mascotas</span>
  </button>

  <div class="grid gap-6 lg:grid-cols-[320px_minmax(0,1fr)]">
    <aside class="rounded-[24px] border border-border bg-card p-6 shadow-sm">
      <div class="flex flex-col gap-4">
        <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-brand text-white shadow-sm">
          <svg viewBox="0 0 24 24" class="h-6 w-6" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
        </div>
        <div class="flex flex-col gap-2">
          <h1 class="text-[28px] font-bold text-text-primary">Nueva mascota</h1>
          <p class="text-sm leading-6 text-text-secondary">
            Página completa para registrar al paciente con más espacio visual, mejor ritmo de lectura y menos fricción que un modal.
          </p>
        </div>
      </div>
    </aside>

    <app-create-pet-modal
      [pageMode]="true"
      [initialTutor]="initialTutor"
      (closed)="close()"
      (saved)="save()"
    />
  </div>
</div>
