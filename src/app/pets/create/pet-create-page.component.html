<div class="mx-auto flex max-w-[1400px] flex-col gap-6 pb-12">
  <button
    type="button"
    (click)="close()"
    class="inline-flex items-center gap-2 self-start text-sm font-medium text-text-secondary transition-colors hover:text-brand"
  >
    <svg viewBox="0 0 24 24" class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="m15 18-6-6 6-6"></path>
    </svg>
    <span>{{ buildBackLabel() }}</span>
  </button>

  <div class="grid gap-6">
    <app-create-pet-modal
      [pageMode]="true"
      [initialTutor]="initialTutor"
      (closed)="close()"
      (saved)="save($event)"
    />
  </div>
</div>
