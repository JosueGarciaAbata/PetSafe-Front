<div class="fixed inset-0 z-[120] bg-black/40 backdrop-blur-[2px]" (click)="close()"></div>

<div class="fixed inset-0 z-[130] flex items-center justify-center p-4">
  <div class="w-full max-w-[720px] overflow-hidden rounded-[16px] border border-border bg-card shadow-2xl">
    <div class="flex items-center justify-between border-b border-border bg-white px-6 py-5">
      <div class="flex flex-col gap-1">
        <h2 class="text-xl font-bold text-text-primary">Editar mascota</h2>
        <p class="text-sm text-text-secondary">Actualiza la informacion basica del paciente.</p>
      </div>

      <button
        type="button"
        (click)="close()"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full text-text-secondary transition-all hover:bg-background hover:text-text-primary"
        aria-label="Cerrar modal"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>

    <div class="max-h-[70vh] overflow-y-auto p-6">
      <div class="flex flex-col gap-6">
        <section class="grid gap-5">
          <h3 class="text-sm font-bold uppercase tracking-wider text-brand">Identificacion</h3>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Nombre</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="text"
                  [ngModel]="name"
                  (ngModelChange)="name = $event"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Especie</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="text"
                  [value]="speciesName || 'Sin especie registrada'"
                  readonly
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2 md:col-span-2">
              <label class="text-sm font-semibold text-text-primary">Raza</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="text"
                  [ngModel]="breedName"
                  (ngModelChange)="breedName = $event"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>
          </div>
        </section>

        <section class="grid gap-5">
          <h3 class="text-sm font-bold uppercase tracking-wider text-brand">Datos basicos</h3>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="flex flex-col gap-2">
              <span class="text-sm font-semibold text-text-primary">Sexo</span>
              <div class="flex h-12 rounded-xl bg-background p-1">
                <button
                  type="button"
                  (click)="setGender('Macho')"
                  class="flex-1 rounded-lg text-xs font-bold transition-all"
                  [class.bg-white]="editGender === 'Macho'"
                  [class.text-brand]="editGender === 'Macho'"
                  [class.shadow-sm]="editGender === 'Macho'"
                  [class.text-text-secondary]="editGender !== 'Macho'"
                >
                  Macho
                </button>
                <button
                  type="button"
                  (click)="setGender('Hembra')"
                  class="flex-1 rounded-lg text-xs font-bold transition-all"
                  [class.bg-white]="editGender === 'Hembra'"
                  [class.text-brand]="editGender === 'Hembra'"
                  [class.shadow-sm]="editGender === 'Hembra'"
                  [class.text-text-secondary]="editGender !== 'Hembra'"
                >
                  Hembra
                </button>
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Fecha de nacimiento</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="date"
                  [ngModel]="birthDate"
                  (ngModelChange)="birthDate = $event"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Peso</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="number"
                  [ngModel]="weightKg"
                  (ngModelChange)="weightKg = $event"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
                <span matTextSuffix class="text-xs font-bold text-text-secondary">kg</span>
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Color</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="pets-field w-full">
                <input
                  matInput
                  type="text"
                  [value]="colorName || 'Sin color registrado'"
                  readonly
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2 md:col-span-2">
              <span class="text-sm font-semibold text-text-primary">Esterilizado</span>
              <div class="flex h-12 rounded-xl bg-background p-1">
                <button
                  type="button"
                  (click)="setSterilized('Si')"
                  class="flex-1 rounded-lg text-xs font-bold transition-all"
                  [class.bg-white]="editSterilized === 'Si'"
                  [class.text-brand]="editSterilized === 'Si'"
                  [class.shadow-sm]="editSterilized === 'Si'"
                  [class.text-text-secondary]="editSterilized !== 'Si'"
                >
                  Si
                </button>
                <button
                  type="button"
                  (click)="setSterilized('No')"
                  class="flex-1 rounded-lg text-xs font-bold transition-all"
                  [class.bg-white]="editSterilized === 'No'"
                  [class.text-brand]="editSterilized === 'No'"
                  [class.shadow-sm]="editSterilized === 'No'"
                  [class.text-text-secondary]="editSterilized !== 'No'"
                >
                  No
                </button>
              </div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-border bg-white px-6 py-5">
      <button
        type="button"
        (click)="close()"
        class="cursor-pointer rounded-xl px-6 py-3 text-sm font-bold text-text-secondary transition-all hover:bg-background"
      >
        Cancelar
      </button>

      <button
        type="button"
        (click)="save()"
        class="cursor-pointer rounded-xl bg-primary px-6 py-3 text-sm font-bold text-white shadow-sm transition-all hover:opacity-90"
      >
        Guardar cambios
      </button>
    </div>
  </div>
</div>
