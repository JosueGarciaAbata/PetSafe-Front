@if (open) {
  <div class="ps-modal-backdrop" (click)="close()"></div>

  <div class="ps-modal-overlay">
    <div class="flex w-full max-w-[520px] flex-col overflow-hidden rounded-[16px] border border-border bg-card shadow-2xl">
      <div class="border-b border-border bg-surface px-5 py-4">
        <h2 class="text-lg font-bold text-text-primary">{{ actionTitle() }}</h2>
        <p class="mt-1 text-sm text-text-secondary">
          {{ actionDescription() }}
        </p>
      </div>

      <div class="px-5 py-5">
        <p class="text-sm leading-6 text-text-primary">
          {{ actionQuestionPrefix() }}<span class="font-bold">{{ productName }}</span>?
        </p>
      </div>

      <div class="flex items-center justify-end gap-3 border-t border-border bg-surface px-5 py-4">
        <button
          type="button"
          (click)="close()"
          [disabled]="isSaving"
          class="cursor-pointer rounded-xl px-5 py-2.5 text-sm font-bold text-text-secondary transition-all hover:bg-background disabled:cursor-not-allowed disabled:opacity-60"
        >
          Cancelar
        </button>

        <button
          type="button"
          (click)="confirm()"
          [disabled]="isSaving"
          [class]="actionButtonClasses()"
        >
          {{ isSaving ? actionLoadingLabel() : actionButtonLabel() }}
        </button>
      </div>
    </div>
  </div>
}
