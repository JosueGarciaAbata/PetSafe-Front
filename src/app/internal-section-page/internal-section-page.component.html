<section class="relative flex min-h-[calc(100vh-144px)] w-full items-center justify-center overflow-hidden rounded-[24px] border border-border bg-card p-8 shadow-sm sm:p-10">
  <div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_top_left,rgba(47,96,94,0.08),transparent_38%),radial-gradient(circle_at_bottom_right,rgba(30,58,138,0.06),transparent_34%)]"></div>

  <div class="relative z-10 w-full max-w-[780px]">
    <span class="inline-flex rounded-full bg-active-soft px-3 py-1 text-xs font-semibold uppercase tracking-[0.12em] text-brand">
      Area interna
    </span>

    <h1 class="mt-4 text-[34px] font-bold leading-tight tracking-tight text-text-primary sm:text-[42px]">
      {{ sectionLabel }}
    </h1>
    <p class="mt-4 max-w-2xl text-base leading-relaxed text-text-secondary">
      La estructura de sidebar y topbar ya esta montada. Este espacio queda listo para reemplazar el placeholder por la pantalla real de este modulo.
    </p>

    <div class="mt-8 grid gap-4 sm:grid-cols-3">
      <div class="rounded-[18px] border border-border bg-background p-4">
        <span class="text-sm text-text-secondary">Ruta</span>
        <strong class="mt-2 block text-lg text-text-primary">/{{ routePath }}</strong>
      </div>
      <div class="rounded-[18px] border border-border bg-background p-4">
        <span class="text-sm text-text-secondary">Layout</span>
        <strong class="mt-2 block text-lg text-brand">Sidebar + Topbar</strong>
      </div>
      <div class="rounded-[18px] border border-border bg-background p-4">
        <span class="text-sm text-text-secondary">Estado</span>
        <strong class="mt-2 block text-lg text-success-text">Listo para contenido</strong>
      </div>
    </div>
  </div>
</section>
