<div class="fixed inset-0 z-[120] bg-black/40 backdrop-blur-[2px]" (click)="close()"></div>

<div class="fixed inset-0 z-[130] flex items-center justify-center p-4">
  <div
    class="w-full max-w-[620px] overflow-hidden rounded-[16px] border border-border bg-card shadow-2xl"
  >
    <div class="flex items-center justify-between border-b border-border bg-white px-6 py-5">
      <div class="flex flex-col gap-1">
        <h2 class="text-xl font-bold text-text-primary">Nuevo propietario</h2>
        <p class="text-sm text-text-secondary">Registra la informacion basica del tutor.</p>
      </div>

      <button
        type="button"
        (click)="close()"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full text-text-secondary transition-all hover:bg-background hover:text-text-primary"
        aria-label="Cerrar modal"
      >
        <svg
          viewBox="0 0 24 24"
          class="h-5 w-5"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
        >
          <path d="M6 6l12 12M18 6 6 18"></path>
        </svg>
      </button>
    </div>

    <div class="max-h-[70vh] overflow-y-auto p-6">
      <div class="flex flex-col gap-6">
        <section class="flex flex-col gap-5">
          <h3 class="text-sm font-bold uppercase tracking-wider text-brand">Datos personales</h3>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Nombre</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="text"
                  placeholder="Ej. Adriana"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Apellido</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="text"
                  placeholder="Ej. Montes"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Cedula</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="text"
                  placeholder="Ej. 1234567890"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <span class="text-sm font-semibold text-text-primary">Genero</span>
              <mat-radio-group [value]="gender" class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <mat-radio-button
                  value="Femenino"
                  (change)="setGender('Femenino')"
                  class="owners-radio-option w-full rounded-xl border border-border bg-white px-4 py-3"
                  [class.border-brand]="gender === 'Femenino'"
                  [class.bg-active-soft]="gender === 'Femenino'"
                >
                  Femenino
                </mat-radio-button>

                <mat-radio-button
                  value="Masculino"
                  (change)="setGender('Masculino')"
                  class="owners-radio-option w-full rounded-xl border border-border bg-white px-4 py-3"
                  [class.border-brand]="gender === 'Masculino'"
                  [class.bg-active-soft]="gender === 'Masculino'"
                >
                  Masculino
                </mat-radio-button>
              </mat-radio-group>
            </div>
          </div>
        </section>

        <section class="flex flex-col gap-5">
          <h3 class="text-sm font-bold uppercase tracking-wider text-brand">Contacto</h3>

          <div class="grid grid-cols-1 gap-5 md:grid-cols-2">
            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Telefono</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="tel"
                  placeholder="+593 000 000 000"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-sm font-semibold text-text-primary">Correo electronico</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="email"
                  placeholder="ejemplo@correo.com"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>

            <div class="flex flex-col gap-2 md:col-span-2">
              <label class="text-sm font-semibold text-text-primary">Direccion</label>
              <mat-form-field appearance="outline" subscriptSizing="dynamic" class="owners-field w-full">
                <input
                  matInput
                  type="text"
                  placeholder="Ej. Calle Mayor 12, Madrid"
                  class="text-sm text-text-primary placeholder:text-text-secondary/50"
                />
              </mat-form-field>
            </div>
          </div>
        </section>
      </div>
    </div>

    <div class="flex items-center justify-end gap-3 border-t border-border bg-white px-6 py-5">
      <button
        type="button"
        (click)="close()"
        class="cursor-pointer rounded-xl px-6 py-3 text-sm font-bold text-text-secondary transition-all hover:bg-background"
      >
        Cancelar
      </button>

      <button
        type="button"
        (click)="save()"
        class="cursor-pointer rounded-xl bg-primary px-6 py-3 text-sm font-bold text-white shadow-sm transition-all hover:opacity-90"
      >
        Guardar propietario
      </button>
    </div>
  </div>
</div>
