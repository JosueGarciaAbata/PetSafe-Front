<div class="flex h-screen w-full overflow-hidden bg-background font-sans antialiased text-text-primary">
  <app-sidebar [isOpen]="sidebarOpen"></app-sidebar>

  <div class="relative flex h-full min-w-0 flex-1 flex-col">
    <app-topbar [sidebarOpen]="sidebarOpen" (toggleSidebar)="toggleSidebar()"></app-topbar>

    <main class="relative flex-1 overflow-y-auto p-4 sm:p-8 lg:px-12 lg:py-8 xl:px-16">
      <div class="pointer-events-none absolute right-0 top-0 -z-10 h-[500px] w-[500px] rounded-full bg-brand/8 blur-[120px]"></div>
      <div class="pointer-events-none absolute bottom-0 left-0 -z-10 h-[400px] w-[400px] rounded-full bg-primary/6 blur-[100px]"></div>
      <div class="pointer-events-none absolute left-1/2 top-1/3 -z-10 h-[350px] w-[350px] -translate-x-1/2 rounded-full bg-[#5fb8b4]/4 blur-[90px]"></div>

      <div class="relative mx-auto w-full max-w-[1400px]">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
