<div class="topbar-panel">
  <div class="topbar-cluster">
    <button
      type="button"
      (click)="toggleSidebar.emit()"
      class="topbar-icon-button"
      [attr.aria-label]="sidebarOpen ? 'Ocultar barra lateral' : 'Mostrar barra lateral'"
    >
      <app-shell-icon name="sidebarToggle" [size]="20"></app-shell-icon>
    </button>

    <div class="topbar-date">
      <app-shell-icon name="calendar" [size]="16"></app-shell-icon>
      <span class="capitalize">{{ today }}</span>
    </div>
  </div>

  <div class="topbar-cluster">
    <!-- Theme toggle -->
    <button
      type="button"
      class="topbar-theme-toggle"
      [class.topbar-theme-toggle--dark]="theme.isDark()"
      (click)="toggleTheme()"
      [attr.aria-label]="theme.isDark() ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      <span class="topbar-theme-toggle__track">
        <span class="topbar-theme-toggle__thumb"></span>
        <span class="topbar-theme-toggle__icon topbar-theme-toggle__icon--sun">
          <app-shell-icon name="sun" [size]="14"></app-shell-icon>
        </span>
        <span class="topbar-theme-toggle__icon topbar-theme-toggle__icon--moon">
          <app-shell-icon name="moon" [size]="14"></app-shell-icon>
        </span>
      </span>
    </button>

    <!-- Notifications -->
    <button
      type="button"
      class="topbar-icon-button topbar-notif-btn"
      aria-label="Notificaciones"
      (click)="goToNotifications()"
    >
      <app-shell-icon name="bell" [size]="20"></app-shell-icon>
      @if (pendingCount() > 0) {
        <span class="topbar-notification-badge">{{ pendingCount() > 99 ? '99+' : pendingCount() }}</span>
      }
    </button>

    <!-- User menu -->
    <div class="topbar-user-menu">
      <button
        type="button"
        (click)="toggleUserMenu($event)"
        class="topbar-user-button"
        aria-haspopup="menu"
        [attr.aria-expanded]="isUserMenuOpen"
      >
        <span class="topbar-user-avatar">{{ initials() }}</span>
        <span class="topbar-user-button__copy">
          <span class="topbar-user-button__name">{{ userName() }}</span>
          <span class="topbar-user-divider"></span>
          <span class="topbar-user-button__role">{{ userRole() }}</span>
        </span>
        <app-shell-icon
          name="chevronDown"
          [size]="14"
          className="topbar-user-button__chevron"
        ></app-shell-icon>
      </button>

      @if (isUserMenuOpen) {
        <div class="topbar-menu" role="menu">
          <div class="topbar-menu__header">
            <p class="topbar-menu__name">{{ userName() }}</p>
            <p class="topbar-menu__role">{{ userRole() }}</p>
          </div>

          <button
            type="button"
            (click)="openSettings()"
            class="topbar-menu__action"
            role="menuitem"
          >
            <app-shell-icon name="settings" [size]="18"></app-shell-icon>
            <span>Configuración</span>
          </button>

          <button
            type="button"
            (click)="logout()"
            class="topbar-menu__action topbar-menu__action--danger"
            role="menuitem"
          >
            <app-shell-icon name="logout" [size]="18"></app-shell-icon>
            <span>Cerrar sesión</span>
          </button>
        </div>
      }
    </div>
  </div>
</div>
