<aside
  class="sidebar-root"
  [style.width.px]="isOpen ? 230 : 0"
  [class.sidebar-root--collapsed]="!isOpen"
  [attr.aria-hidden]="!isOpen"
  [attr.inert]="isOpen ? null : ''"
>
  <div class="sidebar-logo">
    <a
      routerLink="/dashboard"
      class="sidebar-logo__link"
      aria-label="Ir al inicio"
    >
      <app-logo [className]="'scale-90'"></app-logo>
    </a>
  </div>

  <nav class="sidebar-nav">
    @for (item of navItems; track item.id) {
      @if (isGroup(item)) {
        <div class="sidebar-group">
          <button
            type="button"
            (click)="toggleGroup(item)"
            class="sidebar-item"
            [class.sidebar-item--expanded]="isExpanded(item)"
            [attr.aria-expanded]="isExpanded(item)"
          >
            <app-shell-icon
              [name]="item.icon"
              [size]="20"
              [className]="isExpanded(item) ? 'sidebar-item__icon sidebar-item__icon--expanded' : 'sidebar-item__icon'"
            ></app-shell-icon>
            <span class="sidebar-item__label">{{ item.label }}</span>
            <app-shell-icon
              name="chevronDown"
              [size]="16"
              [className]="'sidebar-item__chevron ' + (isExpanded(item) ? 'sidebar-item__chevron--open' : '')"
            ></app-shell-icon>
          </button>

          @if (isExpanded(item)) {
            <div class="sidebar-children">
              @for (child of item.children; track child.path) {
                <a
                  [routerLink]="child.path"
                  routerLinkActive="sidebar-child--active"
                  [routerLinkActiveOptions]="{ exact: child.path === '/vaccination' }"
                  #childRla="routerLinkActive"
                  class="sidebar-child"
                >
                  <span
                    class="sidebar-child__dot"
                    [class.sidebar-child__dot--active]="childRla.isActive"
                  ></span>
                  <span class="sidebar-child__label">{{ child.label }}</span>
                </a>
              }
            </div>
          }
        </div>
      } @else {
        <a
          [routerLink]="item.path"
          routerLinkActive="sidebar-item--active"
          [routerLinkActiveOptions]="{ exact: true }"
          #rla="routerLinkActive"
          class="sidebar-item"
        >
          <app-shell-icon
            [name]="item.icon"
            [size]="20"
            [className]="rla.isActive ? 'sidebar-item__icon--active' : 'sidebar-item__icon'"
          ></app-shell-icon>
          <span class="sidebar-item__label">{{ item.label }}</span>
        </a>
      }
    }
  </nav>
</aside>
